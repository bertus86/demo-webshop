<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - Complete Your Order - Fruit Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header role="banner">
    <div class="header-center">
      <a href="index.html" class="logo" aria-label="Go to homepage">
        <img src="img/fruit-shop-logo.png" class="logo-img" alt="Fruit Shop Logo" />
        <span class="products-text"> View Products </span>
      </a>
      <nav role="navigation" aria-label="Main navigation">
        <a href="basket.html" class="basket-link" aria-label="View shopping basket">
          <img src="img/basket-icon.png" class="basket-img" alt="Shopping basket icon" />
          <span class="basket-text">View shopping basket</span>
        </a>
      </nav>
    </div>
  </header>
  <main id="main-content" role="main">
    <div class="content-box">
      <h1>Checkout</h1>
      <form id="checkoutForm" role="form" aria-label="Checkout form">
        <div class="form-group">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required aria-required="true" aria-label="Enter your full name" />
        </div>
        <div class="form-group">
          <label for="email">Email Address:</label>
          <input type="email" id="email" name="email" required aria-required="true"
            aria-label="Enter your email address" />
          <div id="emailError" style="color: red; display: none;">
            Email address format is not correct. Please use xxx@yyy.zzz
          </div>
        </div>
        <button type="submit" class="cart-action-btn" aria-label="Place order">
          Place Order
        </button>
      </form>
      <div id="successMsg" role="alert" aria-live="polite">
        Thank you for your order!
      </div>
    </div>
  </main>
  <footer>
    <a href="https://www.linkedin.com/in/timlolkema/" target="_blank" rel="noopener noreferrer">
      By Tim Lolkema
    </a>
  </footer>
  <script src="shop.js"></script>
  <script>
    renderBasket();
    document.getElementById("checkoutForm").onsubmit = function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const emailPattern = /^[A-Za-z0-9]+@[A-Za-z0-9]+\.[A-Za-z0-9]+$/;

      if (!emailPattern.test(email)) {
        document.getElementById("emailError").style.display = "block";
        return;
      }

      document.getElementById("emailError").style.display = "none";
      document.getElementById("successMsg").style.display = "block";
      document.getElementById("checkoutForm").style.display = "none";
      clearBasket();
      renderBasket();
    };
  </script>
</body>

</html>
